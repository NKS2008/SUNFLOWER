<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Flower Bloom</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,Helvetica,sans-serif;
        }

        body{
            width:100%;
            height:100vh;
            background:linear-gradient(135deg,#1b1b2f,#162447,#1f4068);
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .container{
            text-align:center;
        }

        h1{
            color:white;
            font-size:48px;
            margin-bottom:20px;
        }

        p{
            color:#ddd;
            font-size:20px;
            margin-bottom:50px;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
        }

        .card{
            width:280px;
            height:320px;
            background:white;
            border-radius:20px;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            transition:.4s;
            box-shadow:0 15px 40px rgba(0,0,0,.3);
        }

        .card:hover{
            transform:translateY(-10px) scale(1.05);
        }

        .emoji{
            font-size:100px;
            margin-bottom:20px;
        }

        .title{
            font-size:30px;
            color:#333;
            font-weight:bold;
        }

        .desc{
            color:#666;
            margin-top:15px;
            font-size:17px;
            padding:0 20px;
        }

        footer{
            position:absolute;
            bottom:20px;
            color:#ddd;
            font-size:14px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🌼 Interactive Flower Bloom 🌼</h1>

    <p>
        Choose your favorite flower and control it with your hand gestures.
    </p>

    <div class="buttons">

        <a href="sunflower.html" class="card">

            <div class="emoji">🌻</div>

            <div class="title">
                Sunflower
            </div>

            <div class="desc">
                Control a realistic sunflower using your webcam.
            </div>

        </a>

        <a href="lily.html" class="card">

            <div class="emoji">🌸</div>

            <div class="title">
                Pink Lily
            </div>

            <div class="desc">
                Grow a beautiful light pink lily with hand gestures.
            </div>

        </a>

    </div>

</div>

<footer>
    MediaPipe Hand Tracking • Interactive Flower Bloom
</footer>

</body>
</html>
